# Ray head template for Mint dev.
# Submit from a host where `/root/.volc/bin/volc ml_task submit` works.

TaskName: "mint-dev-head"
Description: "Mint dev Ray head - CPU only"

Entrypoint: |
  set -euo pipefail
  python3 - <<'PY'
  import time

  import ray
  from ray._private.node import Node
  from ray._private.parameter import RayParams

  ip = ray.util.get_node_ip_address()
  print(f"Local node IP: {ip}", flush=True)

  ray_params = RayParams(
      num_cpus=4,
      num_gpus=0,
      include_dashboard=False,
      gcs_server_port=6379,
  )
  node = Node(ray_params, head=True, shutdown_at_exit=False, spawn_reaper=False)
  while True:
      time.sleep(3600)
  PY

ImageUrl: "image-mindverse-cn-beijing.cr.volces.com/namespace-mindverse/mint:15-sm80"
ResourceQueueID: "q-20251225183621-m2297"
Framework: "Custom"

TaskRoleSpecs:
    - RoleName: "worker"
      RoleReplicas: 1
      Flavor: "ml.g2a.xlarge"

ActiveDeadlineSeconds: 0
DelayExitTimeSeconds: 0
AccessType: "Private"

Storages:
    - Type: "Vepfs"
      MountPath: "/vePFS-Mindverse/share"
      SubPath: "share"
      ReadOnly: false
